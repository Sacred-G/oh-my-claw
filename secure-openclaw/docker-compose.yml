name: oh-my-claw

services:
  oh-my-claw:
    build: .
    env_file: .env
    environment:
      WORKSPACE_DIR: /home/claw/oh-my-claw
    ports:
      - "4096:4096"
    volumes:
      - wa-auth:/app/auth_whatsapp
      - memory:/home/claw/oh-my-claw
    restart: unless-stopped

volumes:
  wa-auth:
  memory:
